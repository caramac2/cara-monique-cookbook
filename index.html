<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#e36b2c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>Cara & Monique's Cookbook</title>
</head>
<body>
  <header>
    <h1>🍽 Cara & Monique's Cookbook</h1>
    <p>Simple weeknight dinners for better energy.</p>
    <input id="search" placeholder="Search recipes, tags or ingredients…" />
  </header>
  <main>
    <section id="planner" class="card">
      <h2>This week</h2>
      <div id="selectedRecipes"></div>
      <button id="shoppingBtn">Generate shopping list</button>
      <pre id="shoppingList"></pre>
    </section>
    <section id="recipes"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
